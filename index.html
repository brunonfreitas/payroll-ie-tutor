<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payroll IE Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body{margin:0;font-family:system-ui;background:#0f1117;color:#e8eaf6}
  .wrap{padding:16px;max-width:800px;margin:0 auto}
  .card{background:#1a1d2e;border:1px solid #2d3055;border-radius:16px;padding:16px;margin:12px 0}
  .btn{width:100%;padding:14px;border:0;border-radius:12px;background:#7c6fe0;color:#fff;font-weight:700;margin:8px 0}
  .opt{width:100%;padding:12px;border:1px solid #2d3055;border-radius:10px;background:#10131c;color:#e8eaf6;text-align:left;margin:8px 0}
  .muted{color:#8b8fa8;font-size:13px}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:6px 10px;border-radius:999px;border:1px solid #2d3055;background:#10131c;color:#8b8fa8;font-size:12px}
  .chip.on{background:#7c6fe0;color:#fff;border-color:#7c6fe0}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h2>Payroll IE Mini App</h2>
    <div class="muted" id="hello">A carregar...</div>
  </div>

  <div class="card">
    <h3>Chapters</h3>
    <div class="row" id="chips"></div>
  </div>

  <div class="card" id="quizCard">
    <div class="muted">Carrega no botão abaixo para puxar o quiz do bot.</div>
    <button class="btn" onclick="loadQuiz()">Start Smart Quiz</button>
  </div>

  <div class="card" id="statusCard">
    <h3>Progress</h3>
    <div class="muted" id="progressText">Ainda não há dados.</div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

document.getElementById('hello').textContent = 'Olá, ' + (tg.initDataUnsafe?.user?.first_name || 'Bruno') + '!';

const chapters = ['Ch1','Ch2','Ch3','Ch4','Ch5','Ch10','Ch12','Ch13'];
let selected = ['Ch1','Ch2','Ch3','Ch4','Ch5'];

function renderChips(){
  const el = document.getElementById('chips');
  el.innerHTML = chapters.map(c => `<button class="chip ${selected.includes(c)?'on':''}" onclick="toggleCh('${c}')">${c}</button>`).join('');
}
function toggleCh(c){
  selected = selected.includes(c) ? selected.filter(x=>x!==c) : [...selected,c];
  renderChips();
}
window.toggleCh = toggleCh;

function loadQuiz(){
  tg.sendData(JSON.stringify({type:'quiz_request', chapters:selected}));
}
window.loadQuiz = loadQuiz;
renderChips();
</script>
</body>
</html>
